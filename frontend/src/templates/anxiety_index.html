{% extends "base.html" %}
{% block title %}充电焦虑指数{% endblock %}
{% block content %}

<style>
    .anxiety-filter-pane {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 20px 24px;
        margin-bottom: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: flex-end;
    }
    .anxiety-filter-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .anxiety-filter-group label {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
    }
    .anxiety-filter-group select,
    .anxiety-filter-group input {
        background: var(--input-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-primary);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        outline: none;
        transition: all 0.2s;
    }
    .anxiety-filter-group select:focus,
    .anxiety-filter-group input:focus {
        border-color: var(--accent-color);
    }
    .formula-tabs {
        display: flex;
        background: var(--input-bg);
        border-radius: 10px;
        padding: 4px;
        gap: 2px;
    }
    .formula-tab {
        padding: 8px 16px;
        border-radius: 7px;
        font-size: 13px;
        cursor: pointer;
        color: var(--text-secondary);
        transition: all 0.2s;
        font-weight: 500;
        white-space: nowrap;
    }
    .formula-tab.active {
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        color: #fff;
        box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }
    .formula-tab:hover:not(.active) {
        background: rgba(56, 189, 248, 0.1);
        color: var(--text-primary);
    }
    .checkbox-row {
        display: flex;
        gap: 16px;
        height: 38px;
        align-items: center;
    }
    .checkbox-row label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text-primary);
    }
    .checkbox-row input[type="checkbox"] {
        accent-color: #38bdf8;
        width: 15px;
        height: 15px;
    }
    .formula-desc {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: -10px;
        margin-bottom: 4px;
        padding: 0 4px;
    }

    .dual-view-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 24px;
        margin-bottom: 24px;
    }
    @media (max-width: 1200px) {
        .dual-view-grid { grid-template-columns: 1fr; }
    }

    .map-card {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 24px;
    }
    .map-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }
    .map-card-header h3 {
        margin: 0;
        color: var(--text-primary);
        font-size: 17px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .period-tag {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        background: rgba(56, 189, 248, 0.15);
        color: #38bdf8;
        font-weight: 500;
    }
    .period-tag.compare {
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
    }
    #anxietyMapChart {
        height: 520px;
        width: 100%;
    }

    .bar-card {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 24px;
    }
    #anxietyBarChart {
        height: 520px;
        width: 100%;
    }

    .province-detail-card {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 28px;
        margin-bottom: 24px;
        display: none;
        animation: slideDown 0.3s ease;
    }
    .province-detail-card.show {
        display: block;
    }
    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .detail-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
    }
    .detail-province-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #f472b6, #f59e0b);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 800;
        color: #fff;
    }
    .detail-province-name {
        font-size: 26px;
        font-weight: 800;
        color: var(--text-primary);
    }
    .detail-level-badge {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        margin-top: 6px;
    }
    .detail-metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
    }
    .detail-metric {
        background: rgba(56, 189, 248, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 16px;
    }
    .detail-metric-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 8px;
    }
    .detail-metric-value {
        font-size: 22px;
        font-weight: 800;
        color: var(--text-primary);
    }
    .detail-metric-unit {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
        margin-left: 4px;
    }
    .detail-advice-box {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(16, 185, 129, 0.08));
        border-left: 4px solid #38bdf8;
        border-radius: 10px;
        padding: 18px 20px;
    }
    .detail-advice-label {
        font-size: 12px;
        font-weight: 700;
        color: #38bdf8;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }
    .detail-advice-text {
        font-size: 14px;
        color: var(--text-primary);
        line-height: 1.6;
    }
    .close-detail-btn {
        margin-left: auto;
        background: var(--input-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-secondary);
        width: 36px;
        height: 36px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }
    .close-detail-btn:hover {
        background: rgba(244, 63, 94, 0.1);
        border-color: rgba(244, 63, 94, 0.3);
        color: #f43f5e;
    }

    .summary-section {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
    }
    .summary-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .summary-header h3 {
        margin: 0;
        color: var(--text-primary);
        font-size: 17px;
        font-weight: 700;
    }
    .summary-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
    }
    .summary-card {
        padding: 18px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        background: rgba(56, 189, 248, 0.04);
    }
    .summary-card.mean { background: linear-gradient(135deg, rgba(56, 189, 248, 0.12), rgba(129, 140, 248, 0.08)); }
    .summary-card.median { background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(52, 211, 153, 0.08)); }
    .summary-card-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 6px;
    }
    .summary-card-value {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .summary-card.median .summary-card-value {
        background: linear-gradient(135deg, #10b981, #34d399);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    #referenceLineChart {
        height: 160px;
        width: 100%;
    }

    .ranklist-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
    }
    @media (max-width: 992px) {
        .ranklist-section { grid-template-columns: 1fr; }
    }
    .ranklist-card {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        overflow: hidden;
    }
    .ranklist-header {
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: background 0.2s;
    }
    .ranklist-header:hover {
        background: rgba(255, 255, 255, 0.02);
    }
    .ranklist-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
    }
    .ranklist-title.high .icon { color: #f43f5e; }
    .ranklist-title.low .icon { color: #10b981; }
    .ranklist-count {
        font-size: 12px;
        color: var(--text-secondary);
        background: var(--input-bg);
        padding: 3px 10px;
        border-radius: 6px;
    }
    .ranklist-toggle {
        font-size: 18px;
        color: var(--text-secondary);
        transition: transform 0.3s;
    }
    .ranklist-card.expanded .ranklist-toggle {
        transform: rotate(180deg);
    }
    .ranklist-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
    }
    .ranklist-card.expanded .ranklist-body {
        max-height: 800px;
    }
    .ranklist-table {
        width: 100%;
        border-collapse: collapse;
    }
    .ranklist-table th {
        padding: 12px 24px;
        font-size: 12px;
        color: var(--text-secondary);
        text-align: left;
        font-weight: 600;
        background: rgba(56, 189, 248, 0.04);
        border-bottom: 1px solid var(--glass-border);
        border-top: 1px solid var(--glass-border);
    }
    .ranklist-table td {
        padding: 14px 24px;
        font-size: 13px;
        color: var(--text-primary);
        border-bottom: 1px solid rgba(51, 65, 85, 0.5);
    }
    .ranklist-table tr:last-child td {
        border-bottom: none;
    }
    .ranklist-table tr:hover td {
        background: rgba(56, 189, 248, 0.05);
    }
    .rank-no {
        display: inline-flex;
        width: 26px;
        height: 26px;
        border-radius: 8px;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 12px;
        background: var(--input-bg);
        color: var(--text-secondary);
    }
    .high .rank-no.top1 { background: linear-gradient(135deg, #f43f5e, #fb7185); color: #fff; }
    .high .rank-no.top2 { background: linear-gradient(135deg, #f97316, #fb923c); color: #fff; }
    .high .rank-no.top3 { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #fff; }
    .low .rank-no.top1 { background: linear-gradient(135deg, #10b981, #34d399); color: #fff; }
    .low .rank-no.top2 { background: linear-gradient(135deg, #14b8a6, #2dd4bf); color: #fff; }
    .low .rank-no.top3 { background: linear-gradient(135deg, #06b6d4, #22d3ee); color: #fff; }
    .pct-change {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-weight: 600;
        font-size: 12px;
    }
    .pct-change.up { color: #f43f5e; }
    .pct-change.down { color: #10b981; }
    .pct-change.flat { color: var(--text-secondary); }
</style>

<div class="anxiety-filter-pane">
    <div class="anxiety-filter-group" style="flex: 1; min-width: 300px;">
        <label>演算公式</label>
        <div class="formula-tabs" id="formulaTabs">
            <div class="formula-tab active" data-formula="default">默认公式</div>
            <div class="formula-tab" data-formula="weighted">加权公式（销量权重）</div>
            <div class="formula-tab" data-formula="conservative">保守公式（密度权重）</div>
        </div>
        <div class="formula-desc" id="formulaDesc">焦虑指数 = 纯电占比 / 桩密度</div>
    </div>

    <div class="anxiety-filter-group">
        <label>动力类型筛选</label>
        <div class="checkbox-row">
            <label><input type="checkbox" id="bevOnly"> 只看纯电</label>
            <label><input type="checkbox" id="excludePhev"> 排除混动</label>
        </div>
    </div>

    <div class="anxiety-filter-group">
        <label>分析季度</label>
        <select id="periodSelect" style="width: 140px;"></select>
    </div>

    <div class="anxiety-filter-group">
        <label>对比季度</label>
        <select id="comparePeriodSelect" style="width: 140px;">
            <option value="">不对比</option>
        </select>
    </div>

    <button onclick="loadAnxietyData()" class="btn" style="height: 38px; align-self: flex-end;">
        刷新数据
    </button>
</div>

<div class="dual-view-grid">
    <div class="map-card">
        <div class="map-card-header">
            <h3>
                <span>⚡</span>
                全国充电焦虑指数热力图
                <span class="period-tag" id="currentPeriodTag">--</span>
                <span class="period-tag compare" id="comparePeriodTag" style="display: none;"></span>
            </h3>
        </div>
        <div id="anxietyMapChart"></div>
    </div>

    <div class="bar-card">
        <div class="map-card-header">
            <h3>
                <span>🏆</span>
                TOP 10 焦虑省份榜
            </h3>
        </div>
        <div id="anxietyBarChart"></div>
    </div>
</div>

<div class="province-detail-card" id="provinceDetailCard">
    <div class="detail-header">
        <div class="detail-province-icon" id="detailIcon">--</div>
        <div>
            <div class="detail-province-name" id="detailName">--</div>
            <div class="detail-level-badge" id="detailLevelBadge">--</div>
        </div>
        <button class="close-detail-btn" onclick="closeProvinceDetail()">×</button>
    </div>
    <div class="detail-metrics" id="detailMetrics"></div>
    <div class="detail-advice-box">
        <div class="detail-advice-label">💡 补能建议</div>
        <div class="detail-advice-text" id="detailAdvice">--</div>
    </div>
</div>

<div class="summary-section">
    <div class="summary-header">
        <h3>📊 全国指数汇总</h3>
    </div>
    <div class="summary-cards" id="summaryCards"></div>
    <div id="referenceLineChart"></div>
</div>

<div class="ranklist-section">
    <div class="ranklist-card high" id="highListCard">
        <div class="ranklist-header" onclick="toggleRankList('high')">
            <div class="ranklist-title high">
                <span class="icon">🔥</span>
                高焦虑省份清单
                <span class="ranklist-count" id="highListCount">0</span>
            </div>
            <div class="ranklist-toggle">▼</div>
        </div>
        <div class="ranklist-body">
            <table class="ranklist-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">排名</th>
                        <th>省份</th>
                        <th>焦虑指数</th>
                        <th>纯电占比</th>
                        <th>桩密度</th>
                        <th>环比</th>
                    </tr>
                </thead>
                <tbody id="highListBody"></tbody>
            </table>
        </div>
    </div>

    <div class="ranklist-card low" id="lowListCard">
        <div class="ranklist-header" onclick="toggleRankList('low')">
            <div class="ranklist-title low">
                <span class="icon">🌿</span>
                低焦虑省份清单
                <span class="ranklist-count" id="lowListCount">0</span>
            </div>
            <div class="ranklist-toggle">▼</div>
        </div>
        <div class="ranklist-body">
            <table class="ranklist-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">排名</th>
                        <th>省份</th>
                        <th>焦虑指数</th>
                        <th>纯电占比</th>
                        <th>桩密度</th>
                        <th>环比</th>
                    </tr>
                </thead>
                <tbody id="lowListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let anxietyCharts = {};
let anxietyMapGeoCache = null;
let anxietyDataCache = null;
let selectedProvince = null;
let currentFormula = 'default';

function initAnxietyCharts() {
    const mapEl = document.getElementById('anxietyMapChart');
    const barEl = document.getElementById('anxietyBarChart');
    const refEl = document.getElementById('referenceLineChart');
    if (mapEl) anxietyCharts.map = echarts.init(mapEl);
    if (barEl) anxietyCharts.bar = echarts.init(barEl);
    if (refEl) anxietyCharts.ref = echarts.init(refEl);

    if (anxietyCharts.map) {
        anxietyCharts.map.on('click', function(params) {
            if (params.componentType === 'series' && params.name) {
                showProvinceDetail(params.name);
                highlightOnBar(params.name);
            }
        });
        anxietyCharts.map.on('mouseover', function(params) {
            if (params.componentType === 'series' && params.name) {
                highlightOnBar(params.name);
            }
        });
        anxietyCharts.map.on('mouseout', function(params) {
            if (anxietyCharts.bar) anxietyCharts.bar.dispatchAction({ type: 'downplay' });
        });
    }

    if (anxietyCharts.bar) {
        anxietyCharts.bar.on('click', function(params) {
            if (params.name) {
                showProvinceDetail(params.name);
                highlightOnMap(params.name);
            }
        });
        anxietyCharts.bar.on('mouseover', function(params) {
            if (params.name) highlightOnMap(params.name);
        });
        anxietyCharts.bar.on('mouseout', function(params) {
            if (anxietyCharts.map) anxietyCharts.map.dispatchAction({ type: 'downplay' });
        });
    }
}

function highlightOnMap(name) {
    if (!anxietyCharts.map) return;
    anxietyCharts.map.dispatchAction({ type: 'downplay' });
    anxietyCharts.map.dispatchAction({ type: 'highlight', name: name });
}
function highlightOnBar(name) {
    if (!anxietyCharts.bar) return;
    anxietyCharts.bar.dispatchAction({ type: 'downplay' });
    anxietyCharts.bar.dispatchAction({ type: 'highlight', name: name });
}

function buildTooltipHtml(p) {
    const data = anxietyDataCache;
    if (!data) return '';
    const province = data.provinces.find(pr => pr.name === p.name);
    if (!province) return p.name;
    let html = `<div style="font-weight:700;font-size:14px;margin-bottom:8px;color:#fff;">${p.name}</div>`;
    html += `<div style="display:flex;justify-content:space-between;gap:20px;margin:4px 0;"><span style="color:#94a3b8;">纯电销量</span><b style="color:#fff;">${province.bev_sales.toLocaleString()} 辆</b></div>`;
    html += `<div style="display:flex;justify-content:space-between;gap:20px;margin:4px 0;"><span style="color:#94a3b8;">桩密度</span><b style="color:#fff;">${province.density} 个/km²</b></div>`;
    html += `<div style="border-top:1px solid #334155;margin:8px 0;padding-top:8px;"></div>`;
    html += `<div style="display:flex;justify-content:space-between;gap:20px;margin:4px 0;"><span style="color:#94a3b8;">纯电占比</span><b style="color:#38bdf8;">${province.bev_ratio}%</b></div>`;
    html += `<div style="display:flex;justify-content:space-between;gap:20px;margin:4px 0;"><span style="color:#94a3b8;">焦虑指数</span><b style="color:#fbbf24;font-size:15px;">${province.index.toFixed(4)}</b></div>`;
    html += `<div style="display:flex;justify-content:space-between;gap:20px;margin:4px 0;"><span style="color:#94a3b8;">全国排名</span><b style="color:#fff;">${province.rank ? '#' + province.rank : '-'}</b></div>`;
    if (province.ring_change) {
        const arrow = province.ring_change.up ? '↑' : '↓';
        const color = province.ring_change.up ? '#f43f5e' : '#10b981';
        html += `<div style="display:flex;justify-content:space-between;gap:20px;margin:4px 0;"><span style="color:#94a3b8;">环比变化</span><b style="color:${color};">${arrow} ${Math.abs(province.ring_change.pct)}%</b></div>`;
    }
    return html;
}

function renderAnxietyMap(data) {
    if (!anxietyCharts.map) return;
    const vals = data.map_data.map(d => d.value).filter(v => v > 0);
    const maxVal = vals.length > 0 ? Math.max(...vals) : 10;

    const option = {
        tooltip: {
            trigger: 'item',
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            textStyle: { color: '#fff', fontSize: 12 },
            formatter: buildTooltipHtml
        },
        visualMap: {
            min: 0,
            max: maxVal > 0 ? maxVal : 10,
            left: '20',
            bottom: '20',
            text: ['高焦虑', '低焦虑'],
            textStyle: { color: '#94a3b8', fontSize: 11 },
            calculable: true,
            inRange: {
                color: ['#1e293b', '#10b981', '#fbbf24', '#f59e0b', '#f43f5e', '#be123c']
            },
            itemWidth: 14,
            itemHeight: 100
        },
        series: [{
            name: '焦虑指数',
            type: 'map',
            mapType: 'china',
            roam: true,
            zoom: 1.1,
            label: {
                show: true,
                color: '#64748b',
                fontSize: 9
            },
            emphasis: {
                label: { show: true, color: '#fff', fontSize: 12, fontWeight: 'bold' },
                itemStyle: {
                    areaColor: '#a78bfa',
                    borderColor: '#fff',
                    borderWidth: 2,
                    shadowBlur: 20,
                    shadowColor: 'rgba(167, 139, 250, 0.6)'
                }
            },
            itemStyle: {
                borderColor: 'rgba(255,255,255,0.15)',
                borderWidth: 0.8
            },
            data: data.map_data
        }]
    };
    anxietyCharts.map.setOption(option, true);
}

function renderAnxietyBar(data) {
    if (!anxietyCharts.bar) return;
    const top10 = data.top10.slice().reverse();
    const names = top10.map(p => {
        return p.name.replace(/市$|省$|壮族自治区$|回族自治区$|维吾尔自治区$|自治区$|特别行政区$/, '');
    });
    const values = top10.map(p => p.index);
    const fullNames = top10.map(p => p.name);
    const changes = top10.map(p => p.ring_change);

    const option = {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            textStyle: { color: '#fff', fontSize: 12 },
            formatter: function(params) {
                const idx = params[0].dataIndex;
                return buildTooltipHtml({ name: fullNames[idx] });
            }
        },
        grid: { left: '80', right: '40', top: '10', bottom: '20' },
        xAxis: {
            type: 'value',
            axisLabel: { color: '#94a3b8', fontSize: 10 },
            splitLine: { lineStyle: { color: '#334155' } },
            axisLine: { show: false },
            axisTick: { show: false }
        },
        yAxis: {
            type: 'category',
            data: names,
            axisLabel: {
                color: function(value, index) {
                    const realIdx = top10.length - 1 - index;
                    const colors = ['#f43f5e', '#f97316', '#f59e0b', '#fbbf24', '#fde047'];
                    if (realIdx < 3) return '#fff';
                    if (realIdx < 5) return colors[3];
                    return '#cbd5e1';
                },
                fontSize: 12,
                fontWeight: 600
            },
            axisLine: { show: false },
            axisTick: { show: false }
        },
        series: [{
            type: 'bar',
            data: values.map((v, i) => {
                const realIdx = top10.length - 1 - i;
                const ring = changes[i];
                const colorStops = [
                    [{ offset: 0, color: '#be123c' }, { offset: 1, color: '#f43f5e' }],
                    [{ offset: 0, color: '#ea580c' }, { offset: 1, color: '#f97316' }],
                    [{ offset: 0, color: '#d97706' }, { offset: 1, color: '#f59e0b' }],
                    [{ offset: 0, color: '#ca8a04' }, { offset: 1, color: '#eab308' }]
                ];
                const cs = realIdx < 3 ? colorStops[realIdx] : colorStops[3];
                return {
                    value: v,
                    itemStyle: {
                        borderRadius: [0, 6, 6, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, cs)
                    },
                    label: {
                        show: true,
                        position: 'right',
                        formatter: function(p) {
                            let s = v.toFixed(2);
                            if (ring) {
                                const arrow = ring.up ? '↑' : '↓';
                                s += `  ${arrow}${Math.abs(ring.pct)}%`;
                            }
                            return s;
                        },
                        color: '#94a3b8',
                        fontSize: 11,
                        fontWeight: 500
                    }
                };
            }),
            barWidth: '60%',
            emphasis: {
                focus: 'series',
                itemStyle: {
                    shadowBlur: 15,
                    shadowColor: 'rgba(244, 63, 94, 0.4)'
                }
            }
        }]
    };
    anxietyCharts.bar.setOption(option, true);
}

function renderSummaryCards(summary) {
    const container = document.getElementById('summaryCards');
    if (!container) return;
    container.innerHTML = `
        <div class="summary-card mean">
            <div class="summary-card-label">全国指数均值</div>
            <div class="summary-card-value">${summary.mean.toFixed(3)}</div>
        </div>
        <div class="summary-card median">
            <div class="summary-card-label">全国指数中位数</div>
            <div class="summary-card-value">${summary.median.toFixed(3)}</div>
        </div>
        <div class="summary-card">
            <div class="summary-card-label">有效省份数</div>
            <div class="summary-card-value" style="-webkit-text-fill-color:#cbd5e1; background:none; -webkit-background-clip:unset;">${summary.count}</div>
        </div>
        <div class="summary-card">
            <div class="summary-card-label">最高 / 最低</div>
            <div class="summary-card-value" style="font-size:18px;-webkit-text-fill-color:#cbd5e1; background:none; -webkit-background-clip:unset;">
                ${summary.max.toFixed(2)} / ${summary.min.toFixed(2)}
            </div>
        </div>
    `;
}

function renderReferenceLine(data) {
    if (!anxietyCharts.ref) return;
    const valid = data.provinces.filter(p => p.index > 0).sort((a, b) => a.index - b.index);
    const names = valid.map(p => p.name.replace(/市$|省$|壮族自治区$|回族自治区$|维吾尔自治区$|自治区$|特别行政区$/, ''));
    const values = valid.map(p => p.index);

    const option = {
        tooltip: {
            trigger: 'axis',
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            textStyle: { color: '#fff' },
            formatter: function(params) {
                const i = params[0].dataIndex;
                const p = valid[i];
                return `<b>${p.name}</b><br/>焦虑指数: ${p.index.toFixed(4)}<br/>排名: #${p.rank}`;
            }
        },
        grid: { left: '60', right: '30', top: '30', bottom: '40' },
        xAxis: {
            type: 'category',
            data: names,
            axisLabel: { color: '#64748b', fontSize: 9, interval: 0, rotate: 45 },
            axisLine: { lineStyle: { color: '#334155' } }
        },
        yAxis: {
            type: 'value',
            axisLabel: { color: '#94a3b8', fontSize: 10 },
            splitLine: { lineStyle: { color: '#334155' } }
        },
        series: [{
            type: 'bar',
            data: values.map(v => {
                let color = '#38bdf8';
                if (v >= data.summary.mean) color = '#f43f5e';
                else if (v >= data.summary.median) color = '#f59e0b';
                else color = '#10b981';
                return { value: v, itemStyle: { color: color, borderRadius: [3, 3, 0, 0] } };
            }),
            barWidth: '55%',
            markLine: {
                silent: true,
                symbol: ['none', 'none'],
                data: [
                    {
                        name: '均值',
                        yAxis: data.summary.mean,
                        lineStyle: { color: '#818cf8', type: 'dashed', width: 2 },
                        label: { formatter: '均值 {c}', color: '#818cf8', fontSize: 11, fontWeight: 600, position: 'insideEndTop' }
                    },
                    {
                        name: '中位数',
                        yAxis: data.summary.median,
                        lineStyle: { color: '#34d399', type: 'dotted', width: 2 },
                        label: { formatter: '中位 {c}', color: '#34d399', fontSize: 11, fontWeight: 600, position: 'insideStartTop' }
                    }
                ]
            }
        }]
    };
    anxietyCharts.ref.setOption(option, true);
}

function renderRankLists(data) {
    renderRankTable('high', data.high_list);
    renderRankTable('low', data.low_list);
    document.getElementById('highListCount').textContent = data.high_list.length;
    document.getElementById('lowListCount').textContent = data.low_list.length;
}

function renderRankTable(type, list) {
    const body = document.getElementById(type === 'high' ? 'highListBody' : 'lowListBody');
    body.innerHTML = list.map((p, i) => {
        const rankClass = i < 3 ? `top${i + 1}` : '';
        const short = p.name.replace(/市$|省$|壮族自治区$|回族自治区$|维吾尔自治区$|自治区$|特别行政区$/, '');
        let ringHtml = '<span class="pct-change flat">—</span>';
        if (p.ring_change) {
            const cls = p.ring_change.up ? 'up' : 'down';
            const arrow = p.ring_change.up ? '↑' : '↓';
            ringHtml = `<span class="pct-change ${cls}">${arrow} ${Math.abs(p.ring_change.pct)}%</span>`;
        }
        return `
            <tr style="cursor:pointer;" onclick="showProvinceDetail('${p.name}')">
                <td><span class="rank-no ${rankClass}">${i + 1}</span></td>
                <td style="font-weight:600;">${short}</td>
                <td style="font-weight:700;color:${type === 'high' ? '#fbbf24' : '#34d399'};">${p.index.toFixed(3)}</td>
                <td>${p.bev_ratio}%</td>
                <td>${p.density}</td>
                <td>${ringHtml}</td>
            </tr>
        `;
    }).join('');
}

function toggleRankList(type) {
    const card = document.getElementById(type === 'high' ? 'highListCard' : 'lowListCard');
    card.classList.toggle('expanded');
}

function showProvinceDetail(name) {
    const data = anxietyDataCache;
    if (!data) return;
    const province = data.provinces.find(p => p.name === name);
    if (!province) return;

    selectedProvince = name;
    const card = document.getElementById('provinceDetailCard');
    card.classList.add('show');

    const short = name.replace(/市$|省$|壮族自治区$|回族自治区$|维吾尔自治区$|自治区$|特别行政区$/, '');
    document.getElementById('detailIcon').textContent = short.charAt(0);
    document.getElementById('detailName').textContent = name;

    const badge = document.getElementById('detailLevelBadge');
    badge.textContent = province.level;
    const levelColors = {
        '🔴 极度压力': 'rgba(244, 63, 94, 0.2)',
        '🟠 较高压力': 'rgba(249, 115, 22, 0.2)',
        '🟡 中等压力': 'rgba(245, 158, 11, 0.2)',
        '🟢 低压力': 'rgba(16, 185, 129, 0.2)'
    };
    const levelTextColors = {
        '🔴 极度压力': '#f43f5e',
        '🟠 较高压力': '#f97316',
        '🟡 中等压力': '#f59e0b',
        '🟢 低压力': '#10b981'
    };
    badge.style.background = levelColors[province.level] || '';
    badge.style.color = levelTextColors[province.level] || '';

    let ringHtml = '<span class="pct-change flat" style="font-size:13px;">—</span>';
    if (province.ring_change) {
        const cls = province.ring_change.up ? 'up' : 'down';
        const arrow = province.ring_change.up ? '↑' : '↓';
        ringHtml = `<span class="pct-change ${cls}" style="font-size:15px;">${arrow} ${Math.abs(province.ring_change.pct)}%</span>`;
    }

    document.getElementById('detailMetrics').innerHTML = `
        <div class="detail-metric">
            <div class="detail-metric-label">纯电销量</div>
            <div class="detail-metric-value">${province.bev_sales.toLocaleString()}<span class="detail-metric-unit">辆</span></div>
        </div>
        <div class="detail-metric">
            <div class="detail-metric-label">纯电占比</div>
            <div class="detail-metric-value" style="color:#38bdf8;">${province.bev_ratio}<span class="detail-metric-unit">%</span></div>
        </div>
        <div class="detail-metric">
            <div class="detail-metric-label">充电桩密度</div>
            <div class="detail-metric-value">${province.density}<span class="detail-metric-unit">个/km²</span></div>
        </div>
        <div class="detail-metric">
            <div class="detail-metric-label">焦虑指数</div>
            <div class="detail-metric-value" style="color:#fbbf24;">${province.index.toFixed(3)}</div>
        </div>
        <div class="detail-metric">
            <div class="detail-metric-label">全国排名</div>
            <div class="detail-metric-value">#${province.rank || '-'}</div>
        </div>
        <div class="detail-metric">
            <div class="detail-metric-label">环比变化</div>
            <div style="padding-top:6px;">${ringHtml}</div>
        </div>
    `;

    document.getElementById('detailAdvice').textContent = province.advice;

    highlightOnMap(name);
    highlightOnBar(short);

    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeProvinceDetail() {
    document.getElementById('provinceDetailCard').classList.remove('show');
    selectedProvince = null;
    if (anxietyCharts.map) anxietyCharts.map.dispatchAction({ type: 'downplay' });
    if (anxietyCharts.bar) anxietyCharts.bar.dispatchAction({ type: 'downplay' });
}

function populatePeriods(data) {
    const sel = document.getElementById('periodSelect');
    const cmp = document.getElementById('comparePeriodSelect');
    sel.innerHTML = data.periods.map(p => `<option value="${p}" ${p === data.current_period ? 'selected' : ''}>${p}</option>`).join('');
    cmp.innerHTML = '<option value="">不对比</option>' + data.periods.map(p => `<option value="${p}" ${p === data.compare_period ? 'selected' : ''}>${p}</option>`).join('');
}

async function loadAnxietyData() {
    const formula = currentFormula;
    const period = document.getElementById('periodSelect').value;
    const compare = document.getElementById('comparePeriodSelect').value;
    const bevOnly = document.getElementById('bevOnly').checked ? '1' : '0';
    const excludePhev = document.getElementById('excludePhev').checked ? '1' : '0';

    const params = new URLSearchParams({
        formula: formula,
        period: period,
        compare_period: compare,
        bev_only: bevOnly,
        exclude_phev: excludePhev
    });

    showToast('正在计算充电焦虑指数...', 'info');

    try {
        const res = await fetch(`/api/anxiety/index?${params.toString()}`);
        const data = await res.json();
        if (data.error) {
            showToast(data.error, 'danger');
            return;
        }

        anxietyDataCache = data;

        const mapUrl = 'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json';
        if (!anxietyMapGeoCache) {
            const mapRes = await fetch(mapUrl);
            anxietyMapGeoCache = await mapRes.json();
            echarts.registerMap('china', anxietyMapGeoCache);
        }

        populatePeriods(data);
        document.getElementById('formulaDesc').textContent = data.formula_info.desc;
        document.getElementById('currentPeriodTag').textContent = data.current_period;
        const cmpTag = document.getElementById('comparePeriodTag');
        if (data.compare_period) {
            cmpTag.style.display = 'inline-block';
            cmpTag.textContent = `vs ${data.compare_period}`;
        } else {
            cmpTag.style.display = 'none';
        }

        renderAnxietyMap(data);
        renderAnxietyBar(data);
        renderSummaryCards(data.summary);
        renderReferenceLine(data);
        renderRankLists(data);

        if (!document.getElementById('highListCard').classList.contains('expanded')) {
            document.getElementById('highListCard').classList.add('expanded');
        }

        showToast('焦虑指数计算完成', 'success');
    } catch (e) {
        console.error('Load anxiety error:', e);
        showToast('数据加载失败，请重试', 'danger');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.formula-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.formula-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFormula = tab.dataset.formula;
            loadAnxietyData();
        };
    });

    document.getElementById('bevOnly').onchange = function() {
        if (this.checked) {
            document.getElementById('excludePhev').checked = false;
        }
        loadAnxietyData();
    };
    document.getElementById('excludePhev').onchange = function() {
        if (this.checked) {
            document.getElementById('bevOnly').checked = false;
        }
        loadAnxietyData();
    };
    document.getElementById('periodSelect').onchange = loadAnxietyData;
    document.getElementById('comparePeriodSelect').onchange = loadAnxietyData;
});

window.addEventListener('load', () => {
    initAnxietyCharts();
    loadAnxietyData();
});

window.addEventListener('resize', () => {
    Object.values(anxietyCharts).forEach(c => { if (c && c.resize) c.resize(); });
});
</script>
{% endblock %}
