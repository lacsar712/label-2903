{% extends "base.html" %}
{% block title %}公告管理{% endblock %}
{% block content %}

<div class="filter-pane">
    <h3><i class="icon"></i> 公告管理</h3>
    <div style="margin-left: auto; display: flex; gap: 15px; align-items: center;">
        <div class="filter-group">
            <label>状态</label>
            <select id="filterStatus" style="width: 120px;">
                <option value="">全部</option>
                <option value="draft">草稿</option>
                <option value="published">已发布</option>
                <option value="offline">已下线</option>
            </select>
        </div>
        <div class="filter-group">
            <label>分类</label>
            <select id="filterCategory" style="width: 120px;">
                <option value="">全部</option>
                <option value="系统维护">系统维护</option>
                <option value="数据更新">数据更新</option>
                <option value="功能上线">功能上线</option>
            </select>
        </div>
        <div class="filter-group">
            <label>关键词</label>
            <input type="text" id="filterKeyword" placeholder="搜索标题或内容" style="width: 200px;">
        </div>
        <button onclick="searchAnnouncements()" class="btn" style="align-self: flex-end;">查询</button>
        <button onclick="resetFilters()" class="btn" style="align-self: flex-end; background: #334155;">重置</button>
    </div>
</div>

<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 24px;">
    <div class="chart-card" style="padding: 28px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #f59e0b, #fbbf24); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px;">
                📝
            </div>
            <div>
                <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 6px;">草稿公告</div>
                <div id="draftCount" style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #fbbf24); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</div>
            </div>
        </div>
    </div>
    <div class="chart-card" style="padding: 28px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #10b981, #34d399); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px;">
                ✅
            </div>
            <div>
                <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 6px;">已发布</div>
                <div id="publishedCount" style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #10b981, #34d399); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</div>
            </div>
        </div>
    </div>
    <div class="chart-card" style="padding: 28px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #64748b, #94a3b8); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px;">
                📦
            </div>
            <div>
                <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 6px;">已下线</div>
                <div id="offlineCount" style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #64748b, #94a3b8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</div>
            </div>
        </div>
    </div>
</div>

<div class="chart-card col-12" style="height: auto; min-height: 500px; padding: 0;">
    <div style="padding: 20px 24px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; gap: 10px; align-items: center;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-secondary);">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> 全选
            </label>
            <span id="selectedCount" style="font-size: 13px; color: var(--text-secondary);">已选 0 条</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="batchPublish()" class="btn" style="background: linear-gradient(135deg, #10b981, #34d399); padding: 8px 16px; font-size: 13px;">批量发布</button>
            <button onclick="batchOffline()" class="btn" style="background: linear-gradient(135deg, #f59e0b, #fbbf24); padding: 8px 16px; font-size: 13px;">批量下线</button>
            <button onclick="batchDelete()" class="btn btn-danger" style="padding: 8px 16px; font-size: 13px;">批量删除</button>
            <button onclick="openAnnouncementModal()" class="btn" style="padding: 8px 16px; font-size: 13px;">+ 新建公告</button>
        </div>
    </div>
    <div class="dashboard-table-container" style="max-height: none; border: none; background: transparent;">
        <table class="dashboard-table">
            <thead>
                <tr>
                    <th style="width: 50px; padding-left: 24px;"></th>
                    <th style="width: 60px;">置顶</th>
                    <th>标题</th>
                    <th style="width: 100px;">分类</th>
                    <th style="width: 80px;">状态</th>
                    <th style="width: 100px;">受众</th>
                    <th style="width: 120px;">生效时间</th>
                    <th style="width: 120px;">失效时间</th>
                    <th style="width: 100px;">已读/未读</th>
                    <th style="width: 100px;">发布人</th>
                    <th style="width: 140px; padding-right: 24px;">操作</th>
                </tr>
            </thead>
            <tbody id="announcementTableBody">
            </tbody>
        </table>
    </div>
    <div style="padding: 20px 24px; border-top: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
        <div id="paginationInfo" style="color: var(--text-secondary); font-size: 14px;">
            共 0 条记录
        </div>
        <div id="paginationControls" style="display: flex; gap: 8px;">
        </div>
    </div>
</div>

<div id="announcementModal" class="modal-overlay" style="display: none; z-index: 2500;">
    <div class="modal" style="width: 700px; max-width: 90vw; max-height: 90vh; overflow-y: auto; text-align: left;">
        <h4 id="modalTitle" style="margin-bottom: 20px;">新建公告</h4>
        <div class="form-group">
            <label>公告标题</label>
            <input type="text" id="announcementTitle" placeholder="请输入公告标题" style="width: 100%;">
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
                <label>分类标签</label>
                <select id="announcementCategory" style="width: 100%;">
                    <option value="系统维护">系统维护</option>
                    <option value="数据更新">数据更新</option>
                    <option value="功能上线">功能上线</option>
                </select>
            </div>
            <div>
                <label>受众范围</label>
                <select id="announcementAudience" style="width: 100%;">
                    <option value="all">全员可见</option>
                    <option value="admin">仅管理员可见</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
                <label>生效时间</label>
                <input type="datetime-local" id="announcementEffectiveAt" style="width: 100%;">
            </div>
            <div>
                <label>失效时间</label>
                <input type="datetime-local" id="announcementExpireAt" style="width: 100%;">
            </div>
        </div>
        <div class="form-group" style="display: flex; gap: 24px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-secondary);">
                <input type="checkbox" id="announcementIsPinned" onchange="togglePinPriority()"> 置顶公告
            </label>
            <div id="pinPriorityWrap" style="display: none;">
                <label style="font-size: 12px; color: var(--text-secondary); font-weight: 600;">置顶优先级</label>
                <input type="number" id="announcementPinPriority" value="0" min="0" style="width: 80px; height: 32px;">
            </div>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-secondary);">
                <input type="checkbox" id="announcementRequireConfirmation"> 需确认已读
            </label>
        </div>
        <div class="form-group">
            <label>公告内容</label>
            <textarea id="announcementContent" rows="10" placeholder="请输入公告正文内容，支持 HTML 富文本..." style="width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 8px; outline: none; font-size: 13px; resize: vertical; font-family: inherit;"></textarea>
        </div>
        <div class="form-group">
            <label>保存状态</label>
            <select id="announcementStatus" style="width: 100%;">
                <option value="draft">保存为草稿</option>
                <option value="published">立即发布</option>
                <option value="offline">下线状态</option>
            </select>
        </div>
        <div class="modal-actions" style="justify-content: flex-end;">
            <button onclick="closeAnnouncementModal()" class="btn" style="background: #334155;">取消</button>
            <button onclick="saveAnnouncement()" class="btn">保存</button>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    const perPage = 20;
    let selectedIds = new Set();
    let editingId = null;

    const categoryColors = {
        '系统维护': '#f59e0b',
        '数据更新': '#38bdf8',
        '功能上线': '#10b981'
    };

    const statusColors = {
        'draft': '#f59e0b',
        'published': '#10b981',
        'offline': '#64748b'
    };

    const statusLabels = {
        'draft': '草稿',
        'published': '已发布',
        'offline': '已下线'
    };

    function togglePinPriority() {
        const wrap = document.getElementById('pinPriorityWrap');
        const checked = document.getElementById('announcementIsPinned').checked;
        wrap.style.display = checked ? 'block' : 'none';
    }

    async function loadStats() {
        try {
            const res = await fetch('/api/admin/announcements/stats');
            const data = await res.json();
            document.getElementById('draftCount').textContent = data.draft_count || 0;
            document.getElementById('publishedCount').textContent = data.published_count || 0;
            document.getElementById('offlineCount').textContent = data.offline_count || 0;
        } catch (e) {
            console.error('Failed to load stats:', e);
        }
    }

    async function loadAnnouncements(page = 1) {
        currentPage = page;
        const status = document.getElementById('filterStatus').value;
        const category = document.getElementById('filterCategory').value;
        const keyword = document.getElementById('filterKeyword').value;

        const params = new URLSearchParams({
            page: page,
            per_page: perPage
        });
        if (status) params.append('status', status);
        if (category) params.append('category', category);
        if (keyword) params.append('keyword', keyword);

        try {
            const res = await fetch(`/api/admin/announcements?${params.toString()}`);
            const data = await res.json();
            renderAnnouncements(data.announcements);
            renderPagination(data);
        } catch (e) {
            console.error('Failed to load announcements:', e);
        }
    }

    function renderAnnouncements(announcements) {
        const tbody = document.getElementById('announcementTableBody');
        if (!announcements || announcements.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="11" style="text-align: center; padding: 60px; color: var(--text-secondary);">
                        暂无公告记录
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = announcements.map(a => {
            const catColor = categoryColors[a.category] || '#94a3b8';
            const statusColor = statusColors[a.status] || '#94a3b8';
            const checked = selectedIds.has(a.id) ? 'checked' : '';
            return `
                <tr>
                    <td style="padding-left: 24px;">
                        <input type="checkbox" class="announcement-checkbox" data-id="${a.id}" ${checked} onchange="toggleSelect(${a.id})">
                    </td>
                    <td>
                        ${a.is_pinned ? `<span style="color: #f59e0b; font-size: 18px;">📌</span><span style="font-size: 12px; color: var(--text-secondary); margin-left: 4px;">${a.pin_priority}</span>` : '<span style="color: var(--text-secondary); opacity: 0.3;">—</span>'}
                    </td>
                    <td>
                        <div style="font-weight: 500; color: var(--text-primary); margin-bottom: 4px;">${a.title}</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">${a.created_at}</div>
                    </td>
                    <td>
                        <span style="padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; background: ${catColor}20; color: ${catColor};">
                            ${a.category}
                        </span>
                    </td>
                    <td>
                        <span style="padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; background: ${statusColor}20; color: ${statusColor};">
                            ${statusLabels[a.status]}
                        </span>
                    </td>
                    <td style="color: var(--text-secondary); font-size: 13px;">
                        ${a.audience === 'all' ? '全员' : '管理员'}
                    </td>
                    <td style="color: var(--text-secondary); font-size: 12px; font-family: 'Courier New', monospace;">
                        ${a.effective_at || '—'}
                    </td>
                    <td style="color: var(--text-secondary); font-size: 12px; font-family: 'Courier New', monospace;">
                        ${a.expire_at || '—'}
                    </td>
                    <td style="font-size: 13px;">
                        <span style="color: #10b981;">${a.read_count}</span>
                        <span style="color: var(--text-secondary);"> / </span>
                        <span style="color: #f43f5e;">${a.unread_count}</span>
                    </td>
                    <td style="color: var(--text-secondary); font-size: 13px;">
                        ${a.created_by}
                    </td>
                    <td style="padding-right: 24px;">
                        <div style="display: flex; gap: 8px;">
                            <button onclick="editAnnouncement(${a.id})" class="btn" style="padding: 4px 12px; font-size: 12px;">编辑</button>
                            <button onclick="deleteAnnouncement(${a.id})" class="btn btn-danger" style="padding: 4px 12px; font-size: 12px;">删除</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function renderPagination(data) {
        const info = document.getElementById('paginationInfo');
        const controls = document.getElementById('paginationControls');
        
        const start = (data.current_page - 1) * data.per_page + 1;
        const end = Math.min(data.current_page * data.per_page, data.total);
        info.textContent = `共 ${data.total} 条记录，显示 ${start}-${end} 条`;

        let html = '';
        
        html += `<button onclick="goToPage(${data.current_page - 1})" class="btn" style="padding: 6px 14px; font-size: 13px; ${data.current_page <= 1 ? 'opacity: 0.5; cursor: not-allowed;' : ''}" ${data.current_page <= 1 ? 'disabled' : ''}>上一页</button>`;
        
        const maxVisible = 5;
        let startPage = Math.max(1, data.current_page - Math.floor(maxVisible / 2));
        let endPage = Math.min(data.pages, startPage + maxVisible - 1);
        startPage = Math.max(1, endPage - maxVisible + 1);

        for (let i = startPage; i <= endPage; i++) {
            const isActive = i === data.current_page;
            html += `<button onclick="goToPage(${i})" class="btn" style="padding: 6px 14px; font-size: 13px; ${isActive ? 'background: linear-gradient(135deg, #38bdf8, #818cf8);' : 'background: #334155;'}">${i}</button>`;
        }
        
        html += `<button onclick="goToPage(${data.current_page + 1})" class="btn" style="padding: 6px 14px; font-size: 13px; ${data.current_page >= data.pages ? 'opacity: 0.5; cursor: not-allowed;' : ''}" ${data.current_page >= data.pages ? 'disabled' : ''}>下一页</button>`;
        
        controls.innerHTML = html;
    }

    function goToPage(page) {
        if (page < 1) return;
        loadAnnouncements(page);
    }

    function searchAnnouncements() {
        loadAnnouncements(1);
    }

    function resetFilters() {
        document.getElementById('filterStatus').value = '';
        document.getElementById('filterCategory').value = '';
        document.getElementById('filterKeyword').value = '';
        loadAnnouncements(1);
    }

    function toggleSelect(id) {
        if (selectedIds.has(id)) {
            selectedIds.delete(id);
        } else {
            selectedIds.add(id);
        }
        updateSelectedCount();
    }

    function toggleSelectAll() {
        const checkAll = document.getElementById('selectAll').checked;
        const checkboxes = document.querySelectorAll('.announcement-checkbox');
        if (checkAll) {
            checkboxes.forEach(cb => {
                selectedIds.add(parseInt(cb.dataset.id));
                cb.checked = true;
            });
        } else {
            checkboxes.forEach(cb => {
                selectedIds.delete(parseInt(cb.dataset.id));
                cb.checked = false;
            });
        }
        updateSelectedCount();
    }

    function updateSelectedCount() {
        document.getElementById('selectedCount').textContent = `已选 ${selectedIds.size} 条`;
    }

    function openAnnouncementModal(id = null) {
        editingId = id;
        const modal = document.getElementById('announcementModal');
        document.getElementById('modalTitle').textContent = id ? '编辑公告' : '新建公告';
        
        if (id) {
            fetch(`/api/admin/announcements/${id}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('announcementTitle').value = data.title;
                    document.getElementById('announcementContent').value = data.content;
                    document.getElementById('announcementCategory').value = data.category;
                    document.getElementById('announcementAudience').value = data.audience;
                    document.getElementById('announcementIsPinned').checked = data.is_pinned;
                    document.getElementById('announcementPinPriority').value = data.pin_priority;
                    document.getElementById('announcementRequireConfirmation').checked = data.require_confirmation;
                    document.getElementById('announcementStatus').value = data.status;
                    document.getElementById('announcementEffectiveAt').value = data.effective_at || '';
                    document.getElementById('announcementExpireAt').value = data.expire_at || '';
                    togglePinPriority();
                });
        } else {
            document.getElementById('announcementTitle').value = '';
            document.getElementById('announcementContent').value = '';
            document.getElementById('announcementCategory').value = '系统维护';
            document.getElementById('announcementAudience').value = 'all';
            document.getElementById('announcementIsPinned').checked = false;
            document.getElementById('announcementPinPriority').value = 0;
            document.getElementById('announcementRequireConfirmation').checked = false;
            document.getElementById('announcementStatus').value = 'draft';
            document.getElementById('announcementEffectiveAt').value = '';
            document.getElementById('announcementExpireAt').value = '';
            togglePinPriority();
        }
        
        modal.style.display = 'flex';
    }

    function closeAnnouncementModal() {
        document.getElementById('announcementModal').style.display = 'none';
        editingId = null;
    }

    function saveAnnouncement() {
        const title = document.getElementById('announcementTitle').value.trim();
        if (!title) {
            showToast('请输入公告标题', 'danger');
            return;
        }

        const data = {
            title: title,
            content: document.getElementById('announcementContent').value,
            category: document.getElementById('announcementCategory').value,
            audience: document.getElementById('announcementAudience').value,
            is_pinned: document.getElementById('announcementIsPinned').checked,
            pin_priority: parseInt(document.getElementById('announcementPinPriority').value) || 0,
            require_confirmation: document.getElementById('announcementRequireConfirmation').checked,
            status: document.getElementById('announcementStatus').value,
            effective_at: document.getElementById('announcementEffectiveAt').value,
            expire_at: document.getElementById('announcementExpireAt').value
        };

        const url = editingId ? `/api/admin/announcements/${editingId}` : '/api/admin/announcements';
        const method = editingId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(r => r.json())
        .then(d => {
            showToast(editingId ? '更新成功' : '创建成功', 'success');
            closeAnnouncementModal();
            loadAnnouncements(currentPage);
            loadStats();
        })
        .catch(() => showToast('操作失败', 'danger'));
    }

    function editAnnouncement(id) {
        openAnnouncementModal(id);
    }

    function deleteAnnouncement(id) {
        showModal('删除公告', '确定要删除这条公告吗？', () => {
            fetch(`/api/admin/announcements/${id}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(d => {
                    showToast('删除成功', 'success');
                    selectedIds.delete(id);
                    loadAnnouncements(currentPage);
                    loadStats();
                })
                .catch(() => showToast('删除失败', 'danger'));
        });
    }

    function batchPublish() {
        if (selectedIds.size === 0) {
            showToast('请先选择要发布的公告', 'danger');
            return;
        }
        showModal('批量发布', `确定要发布选中的 ${selectedIds.size} 条公告吗？`, () => {
            batchAction('publish');
        });
    }

    function batchOffline() {
        if (selectedIds.size === 0) {
            showToast('请先选择要下线的公告', 'danger');
            return;
        }
        showModal('批量下线', `确定要下线选中的 ${selectedIds.size} 条公告吗？`, () => {
            batchAction('offline');
        });
    }

    function batchDelete() {
        if (selectedIds.size === 0) {
            showToast('请先选择要删除的公告', 'danger');
            return;
        }
        showModal('批量删除', `确定要删除选中的 ${selectedIds.size} 条公告吗？此操作不可恢复。`, () => {
            batchAction('delete');
        });
    }

    function batchAction(action) {
        fetch('/api/admin/announcements/batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                ids: Array.from(selectedIds),
                action: action
            })
        })
        .then(r => r.json())
        .then(d => {
            showToast(`操作成功，共处理 ${d.count} 条`, 'success');
            selectedIds.clear();
            document.getElementById('selectAll').checked = false;
            loadAnnouncements(currentPage);
            loadStats();
        })
        .catch(() => showToast('操作失败', 'danger'));
    }

    window.addEventListener('load', () => {
        loadStats();
        loadAnnouncements(1);
    });
</script>
{% endblock %}
